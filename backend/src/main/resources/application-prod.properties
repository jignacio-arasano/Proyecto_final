# Perfil PROD - Supabase PostgreSQL
# Usa Transaction Pooler (puerto 6543) en lugar del Session Pooler (5432)
# El Transaction Pooler soporta muchas más conexiones simultáneas — ideal para deploy en cloud
# prepareThreshold=0 desactiva prepared statements del lado del servidor (requerido por PgBouncer en modo transaction)
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.kvblduxxvkiuixsadzmf
spring.datasource.password=vOyvWwCOEn5wMBGt
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — pool conservador para no saturar el pooler
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
