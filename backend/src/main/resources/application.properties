spring.application.name=marketplace-backend
spring.jpa.show-sql=false

# ---------------------------------------------------------------
# Base de datos: Supabase (PostgreSQL).
# Se usa el Transaction Pooler (puerto 6543) en lugar del Session Pooler (5432):
# soporta muchas más conexiones simultáneas, ideal para deploy en cloud.
# prepareThreshold=0 desactiva los prepared statements del lado del servidor
# (requerido por PgBouncer en modo transaction).
# Las credenciales pueden sobreescribirse con variables de entorno al desplegar
# en Oracle Cloud (SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD).
# ---------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.kvblduxxvkiuixsadzmf}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vOyvWwCOEn5wMBGt}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — pool conservador para no saturar el pooler de Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Railway inyecta PORT automáticamente; en local usa 8080
server.port=${PORT:8080}

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=c2VjcmV0S2V5TWFya2V0cGxhY2VUZmdKb3NlSWduYWNpb0FsdmFyZXpSYXNhbm8yMDI2
app.jwt.expiration=86400000

# Single user credentials
app.auth.username=admin
app.auth.password=admin123

# Predictor service — en producción se sobreescribe con variable de entorno APP_PREDICTOR_URL
app.predictor.url=${APP_PREDICTOR_URL:http://localhost:5001}

# CORS — en producción se sobreescribe con APP_CORS_ALLOWED_ORIGINS (puede ser lista separada por comas)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
